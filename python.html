<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Python 在线练习室</title>
    <style>
        body { font-family: Microsoft YaHei; margin: 20px; background:#f5f5f5; }
        .container { max-width: 900px; margin: auto; background:white; padding:20px; border-radius:8px; box-shadow:0 0 10px #ccc; }
        textarea { width:100%; height:200px; font-size:16px; padding:10px; margin-bottom:10px; }
        button { padding:10px 20px; font-size:16px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; }
        #output { background:#222; color:#fff; padding:15px; border-radius:5px; margin-top:10px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
<div class="container">
    <h2 style=color: #ff0000>251人工智能班Python 在线学习</h2>
    <textarea id="code">print("Hello Python")
# 在这里写你的代码</textarea>
    <button onclick="runPython()">运行代码</button>
    <h3 color=red>运行结果：</h3>
    <div id="output"></div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script>
    let pyodide;
    async function load() {
        pyodide = await loadPyodide();
    }
    load();

    async function runPython() {
        let code = document.getElementById("code").value;
        let out = document.getElementById("output");
        try {
            let res = await pyodide.runPythonAsync(code);
            out.textContent = res || "运行完成（无输出）";
        } catch (e) {
            out.textContent = "错误：\n" + e.toString();
        }
    }
</script>
</body>
</html>
