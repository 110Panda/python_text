<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>251人工智能班Python在线学习</title>
    <style>
        body { font-family: "Microsoft YaHei"; background: #f5f5f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h2 { color: #ff0000; text-align: center; }
        textarea { width: 100%; height: 200px; font-size: 16px; padding: 10px; margin: 10px 0; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #output { background: #222; color: white; padding: 15px; border-radius: 5px; min-height: 60px; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h2>251人工智能班Python 在线学习</h2>
        <textarea id="code">print("Hello Python")
print("    Hello word!")</textarea>
        <button onclick="runCode()">运行代码</button>
        <h3 style="color:red">运行结果：</h3>
        <div id="output"></div>
    </div>

    <!-- 引入最简单的 Python 运行库 -->
    <script src="https://cdn.jsdelivr.net/npm/brython@3.12.1/brython.min.js"></script>
    <script>
        // 初始化 Brython
        window.onload = function() {
            brython();
        };

        // 运行代码函数
        function runCode() {
            const code = document.getElementById("code").value;
            const output = document.getElementById("output");
            output.innerHTML = ""; // 清空
            
            try {
                // 用 Brython 执行 Python 代码
                const runner = Brython();
                runner.runPython(code, output);
            } catch (e) {
                output.textContent = "错误：" + e.message;
            }
        }
    </script>
</body>
</html>
