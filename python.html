<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>251人工智能班Python在线学习</title>
    <!-- 引入 Pyodide 库 -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #ff0000;
            margin-bottom: 15px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 220px;
            font-size: 16px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: vertical;
            margin-bottom: 15px;
            font-family: monospace;
        }
        button {
            padding: 10px 25px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        h3 {
            color: red;
            margin: 20px 0 10px;
        }
        #output {
            background-color: #222;
            color: #fff;
            padding: 15px;
            border-radius: 6px;
            min-height: 80px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>251人工智能班Python 在线学习</h2>
        <textarea id="code" placeholder="在这里输入你的Python代码...">print("Hello Python")
print("    Hello word!")</textarea>
        <button onclick="runPython()">运行代码</button>
        <h3>运行结果：</h3>
        <div id="output"></div>
    </div>

    <script>
        let pyodide;

        // 初始化 Pyodide
        async function loadPyodideEngine() {
            if (!pyodide) {
                pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/"
                });
            }
        }

        // 执行 Python 代码
        async function runPython() {
            await loadPyodideEngine();
            
            const codeInput = document.getElementById("code");
            const outputArea = document.getElementById("output");
            const code = codeInput.value;

            // 清空之前的输出
            outputArea.textContent = "";

            try {
                // 捕获 print 输出
                pyodide.setStdout({
                    batched: (msg) => {
                        outputArea.textContent += msg;
                    }
                });
                // 异步执行代码
                await pyodide.runPythonAsync(code);
            } catch (error) {
                outputArea.textContent = "错误：" + error.toString();
            }
        }
    </script>
</body>
</html>
